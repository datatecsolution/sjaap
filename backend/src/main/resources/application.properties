spring.application.name=sjaap-backend
server.port=8081

# Database Configuration (MySQL) — overridable via env vars for Docker
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sjaap?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Jdmm123.}

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS — comma-separated origins (override in production)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# Admin seed credentials (override with env vars in production)
admin.seed.email=${ADMIN_EMAIL:jdmayorga82@yahoo.com}
